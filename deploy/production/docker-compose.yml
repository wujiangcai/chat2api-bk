name: chatgpt2api-production

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:?set POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER:?set POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--save", "60", "1000"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?set MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?set MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data

  minio-init:
    image: minio/mc:latest
    depends_on:
      - minio
    restart: "no"
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 ${MINIO_ROOT_USER:?set MINIO_ROOT_USER} ${MINIO_ROOT_PASSWORD:?set MINIO_ROOT_PASSWORD}; do sleep 2; done;
      mc mb --ignore-existing local/${OBJECT_STORAGE_BUCKET:?set OBJECT_STORAGE_BUCKET};
      mc anonymous set download local/${OBJECT_STORAGE_BUCKET:?set OBJECT_STORAGE_BUCKET} || true;
      "

  api:
    build:
      context: ../..
      dockerfile: Dockerfile
    image: chatgpt2api:production
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
      minio-init:
        condition: service_completed_successfully
    environment:
      APP_ENV: ${APP_ENV:-production}
      CHATGPT2API_AUTH_KEY: ${CHATGPT2API_AUTH_KEY:?set CHATGPT2API_AUTH_KEY}
      CHATGPT2API_BASE_URL: ${CHATGPT2API_BASE_URL:?set CHATGPT2API_BASE_URL}
      WEB_ALLOWED_ORIGINS: ${WEB_ALLOWED_ORIGINS:?set WEB_ALLOWED_ORIGINS}
      STORAGE_BACKEND: postgres
      DATABASE_URL: ${DATABASE_URL:?set DATABASE_URL}
      IMAGE_JOB_QUEUE_BACKEND: redis
      REDIS_URL: ${REDIS_URL:?set REDIS_URL}
      IMAGE_JOB_WORKER_INTERVAL_SECONDS: ${IMAGE_JOB_WORKER_INTERVAL_SECONDS:-1}
      IMAGE_JOB_MAX_ATTEMPTS: ${IMAGE_JOB_MAX_ATTEMPTS:-3}
      IMAGE_JOB_RETRY_DELAY_SECONDS: ${IMAGE_JOB_RETRY_DELAY_SECONDS:-10}
      IMAGE_JOB_STALE_RUNNING_SECONDS: ${IMAGE_JOB_STALE_RUNNING_SECONDS:-900}
      OBJECT_STORAGE_BACKEND: ${OBJECT_STORAGE_BACKEND:-minio}
      OBJECT_STORAGE_BUCKET: ${OBJECT_STORAGE_BUCKET:?set OBJECT_STORAGE_BUCKET}
      OBJECT_STORAGE_ENDPOINT: ${OBJECT_STORAGE_ENDPOINT:?set OBJECT_STORAGE_ENDPOINT}
      OBJECT_STORAGE_REGION: ${OBJECT_STORAGE_REGION:-auto}
      OBJECT_STORAGE_ACCESS_KEY_ID: ${OBJECT_STORAGE_ACCESS_KEY_ID:?set OBJECT_STORAGE_ACCESS_KEY_ID}
      OBJECT_STORAGE_SECRET_ACCESS_KEY: ${OBJECT_STORAGE_SECRET_ACCESS_KEY:?set OBJECT_STORAGE_SECRET_ACCESS_KEY}
      OBJECT_STORAGE_PUBLIC_BASE_URL: ${OBJECT_STORAGE_PUBLIC_BASE_URL:?set OBJECT_STORAGE_PUBLIC_BASE_URL}
      OBJECT_STORAGE_PREFIX: ${OBJECT_STORAGE_PREFIX:-prod}
      OBJECT_STORAGE_ACL: ${OBJECT_STORAGE_ACL:-}
      SECURITY_HEADERS_ENABLED: ${SECURITY_HEADERS_ENABLED:-true}
      FORCE_HTTPS: ${FORCE_HTTPS:-false}
      ENABLE_HSTS: ${ENABLE_HSTS:-true}
      HSTS_MAX_AGE_SECONDS: ${HSTS_MAX_AGE_SECONDS:-31536000}
      CONTENT_SECURITY_POLICY: ${CONTENT_SECURITY_POLICY:-}
      REGISTRATION_ENABLED: ${REGISTRATION_ENABLED:-true}
      LOGIN_RATE_LIMIT_PER_MINUTE: ${LOGIN_RATE_LIMIT_PER_MINUTE:-8}
      KEY_LOGIN_RATE_LIMIT_PER_MINUTE: ${KEY_LOGIN_RATE_LIMIT_PER_MINUTE:-12}
      REGISTER_RATE_LIMIT_PER_MINUTE: ${REGISTER_RATE_LIMIT_PER_MINUTE:-4}
      REDEEM_RATE_LIMIT_PER_MINUTE: ${REDEEM_RATE_LIMIT_PER_MINUTE:-12}
      BACKUP_OUTPUT_DIR: ${BACKUP_OUTPUT_DIR:-/app/data/backups}
      BACKUP_INCLUDE_ASSETS: ${BACKUP_INCLUDE_ASSETS:-true}
      BACKUP_RETENTION_DAYS: ${BACKUP_RETENTION_DAYS:-30}
      ALERT_JOB_QUEUE_BACKLOG_THRESHOLD: ${ALERT_JOB_QUEUE_BACKLOG_THRESHOLD:-100}
      ALERT_DEAD_LETTER_THRESHOLD: ${ALERT_DEAD_LETTER_THRESHOLD:-1}
      ALERT_RUNNING_JOB_STALE_SECONDS: ${ALERT_RUNNING_JOB_STALE_SECONDS:-900}
      ALERT_DISK_FREE_MB: ${ALERT_DISK_FREE_MB:-512}
      ALERT_BACKUP_MAX_AGE_HOURS: ${ALERT_BACKUP_MAX_AGE_HOURS:-24}
    volumes:
      - api_data:/app/data
    expose:
      - "80"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1/health/live', timeout=3).read()\""]
      interval: 15s
      timeout: 5s
      retries: 10

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    environment:
      CADDY_SITE_ADDRESS: ${CADDY_SITE_ADDRESS:?set CADDY_SITE_ADDRESS}
      ACME_EMAIL: ${ACME_EMAIL:?set ACME_EMAIL}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  postgres_data:
  redis_data:
  minio_data:
  api_data:
  caddy_data:
  caddy_config:
